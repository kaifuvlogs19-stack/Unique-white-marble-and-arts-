<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique White Marble And Arts | Premium Handicrafts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ====================================
   RESET & ROOT VARIABLES
==================================== */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --gold: #c8a96e;
    --glt: #e2c68a;
    --gdk: #8a6a3a;
    --n1: #0f172a;
    --n2: #020617;
    --n3: #1e293b;
    --cream: #f1f5f9;
    --text: #cbd5e1;
    --green: #22c55e;
    --white: #ffffff;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    background: var(--n1);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
}

/* ====================================
   HEADER & NAVIGATION
==================================== */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 5vw;
    background: rgba(2, 6, 23, 0.92);
    border-bottom: 1px solid rgba(200, 169, 110, 0.12);
    backdrop-filter: blur(16px);
    transition: all 0.4s ease;
}

header.scrolled {
    padding: 0.8rem 5vw;
    background: rgba(2, 6, 23, 0.98);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    border-bottom: 1px solid rgba(200, 169, 110, 0.2);
}

.logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--glt);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    transition: transform 0.3s ease;
}

.logo:hover {
    transform: scale(1.05);
}

.logo em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
}

.nav-r {
    display: flex;
    align-items: center;
    gap: 2rem;
}

.nav-links {
    display: flex;
    gap: 2rem;
    align-items: center;
}

.nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(203, 213, 225, 0.8);
    text-decoration: none;
    position: relative;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
}

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.3s ease;
}

.nav-links a:hover {
    color: var(--glt);
}

.nav-links a:hover::after {
    width: 100%;
}

.cart-btn {
    background: rgba(200, 169, 110, 0.15);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--glt);
    padding: 0.5rem 1.2rem;
    border-radius: 25px;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s ease;
}

.cart-btn:hover {
    background: rgba(200, 169, 110, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(200, 169, 110, 0.2);
}

.cart-count {
    background: var(--green);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
}

.cart-count.active {
    display: flex;
}

.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0.5rem;
    z-index: 201;
}

.hamburger span {
    width: 26px;
    height: 2.5px;
    background: var(--glt);
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(8px, 8px);
}

.hamburger.active span:nth-child(2) {
    opacity: 0;
}

.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
}

@media (max-width: 768px) {
    .nav-links {
        display: none !important;
    }
    .hamburger {
        display: flex;
    }
    .logo {
        font-size: 1.1rem;
    }
}

/* Mobile Navigation */
.mobile-nav {
    position: fixed;
    inset: 0;
    z-index: 190;
    background: rgba(2, 6, 23, 0.98);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.mobile-nav.active {
    opacity: 1;
    pointer-events: all;
}

.mobile-nav a {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--cream);
    text-decoration: none;
    transform: translateY(30px);
    opacity: 0;
    transition: all 0.4s ease;
}

.mobile-nav.active a {
    transform: translateY(0);
    opacity: 1;
}

.mobile-nav a:nth-child(1) { transition-delay: 0.1s; }
.mobile-nav a:nth-child(2) { transition-delay: 0.2s; }
.mobile-nav a:nth-child(3) { transition-delay: 0.3s; }
.mobile-nav a:nth-child(4) { transition-delay: 0.4s; }

/* ====================================
   HERO SECTION
==================================== */
.hero {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10rem 5vw 6rem;
}

.hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: #020617;
}

.hero-bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0.7;
}

.hero-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(
        160deg,
        rgba(2, 6, 23, 0.85),
        rgba(10, 15, 30, 0.7) 50%,
        rgba(2, 6, 23, 0.9)
    );
}

.hero-glow {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(
        ellipse 70% 60% at 50% 40%,
        rgba(200, 169, 110, 0.15),
        transparent 70%
    );
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    max-width: 900px;
}

.eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.5s forwards;
}

.hero h1 em {
    font-style: italic;
    color: var(--glt);
    font-weight: 400;
}

.hero-subtitle {
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(203, 213, 225, 0.7);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
}

.hero-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: center;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
}

.tag {
    border: 1px solid rgba(200, 169, 110, 0.35);
    padding: 0.45rem 1.2rem;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    border-radius: 25px;
    background: rgba(200, 169, 110, 0.08);
    transition: all 0.3s ease;
}

.tag:hover {
    background: rgba(200, 169, 110, 0.18);
    transform: translateY(-3px);
}

.hero-btns {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
}

.btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 10px;
    transition: all 0.4s ease;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    border: none;
    font-weight: 500;
}

.btn-green {
    background: var(--green);
    color: #fff;
    box-shadow: 0 6px 24px rgba(34, 197, 94, 0.35);
}

.btn-green:hover {
    background: #16a34a;
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(34, 197, 94, 0.45);
}

.btn-outline {
    border: 1px solid rgba(200, 169, 110, 0.45);
    color: var(--glt);
    background: transparent;
}

.btn-outline:hover {
    background: rgba(200, 169, 110, 0.15);
    transform: translateY(-3px);
}

.scroll-hint {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.5s forwards;
}

.scroll-hint span {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(200, 169, 110, 0.6);
}

.scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: pulse 2s ease infinite;
}

/* Animations */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
    from {
        transform: translateY(30px);
    }
}

@keyframes fadeIn {
    to {
        opacity: 1;
    }
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.4;
    }
    50% {
        opacity: 1;
    }
}

/* ====================================
   STATS SECTION
==================================== */
.stats {
    padding: 4rem 5vw;
    background: linear-gradient(135deg, var(--n3), var(--n2));
    border-top: 1px solid rgba(200, 169, 110, 0.15);
    border-bottom: 1px solid rgba(200, 169, 110, 0.15);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4rem;
    text-align: center;
}

.stat-item {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
}

.stat-item.visible {
    opacity: 1;
    transform: translateY(0);
}

.stat-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--glt);
    line-height: 1;
}

.stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(203, 213, 225, 0.5);
    margin-top: 0.5rem;
}

/* ====================================
   INFO STRIP
==================================== */
.strip {
    padding: 0.8rem 5vw;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-top: 3px solid var(--green);
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), rgba(30, 41, 59, 0.5));
}

.strip.gold {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(200, 169, 110, 0.08), rgba(30, 41, 59, 0.5));
}

.strip-text {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(203, 213, 225, 0.6);
}

.strip-text strong {
    color: var(--cream);
    font-weight: 600;
}

/* ====================================
   SECTION COMMON STYLES
==================================== */
.section {
    padding: 6rem 5vw;
}

.section-label {
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: block;
}

.section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 300;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 1.2rem;
}

.section-title em {
    font-style: italic;
    background: linear-gradient(90deg, var(--gold), var(--glt), var(--gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shine 4s linear infinite;
}

@keyframes shine {
    to {
        background-position: 200% center;
    }
}

.divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin-bottom: 1.5rem;
}

.section-description {
    font-size: 0.9rem;
    line-height: 2;
    color: rgba(203, 213, 225, 0.6);
    max-width: 600px;
}

.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ====================================
   CATEGORY PILLS
==================================== */
.category-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    margin: 2.5rem 0;
}

.pill {
    padding: 0.5rem 1.5rem;
    border: 1px solid rgba(200, 169, 110, 0.25);
    border-radius: 25px;
    background: transparent;
    color: rgba(203, 213, 225, 0.6);
    font-family: 'Poppins', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
}

.pill.active,
.pill:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--n1);
    font-weight: 600;
    transform: translateY(-2px);
}

/* ====================================
   PRODUCT SLIDER (FOUNTAINS)
==================================== */
.slider-wrapper {
    position: relative;
    padding: 0 3.5rem;
}

@media (max-width: 600px) {
    .slider-wrapper {
        padding: 0 2.5rem;
    }
}

.slider-overflow {
    overflow: hidden;
    border-radius: 16px;
}

.slider-track {
    display: flex;
    gap: 2rem;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    cursor: grab;
}

.slider-track.dragging {
    cursor: grabbing;
    transition: none;
}

.fountain-card {
    flex: 0 0 calc(33.333% - 1.35rem);
    background: var(--n3);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(200, 169, 110, 0.1);
    transition: all 0.4s ease;
    opacity: 0;
    transform: translateY(25px);
}

.fountain-card.visible {
    opacity: 1;
    transform: translateY(0);
}

.fountain-card:hover {
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
    border-color: rgba(200, 169, 110, 0.35);
    transform: translateY(-8px);
}

@media (max-width: 900px) {
    .fountain-card {
        flex: 0 0 calc(50% - 1rem);
    }
}

@media (max-width: 560px) {
    .fountain-card {
        flex: 0 0 100%;
    }
}

.card-image-wrapper {
    position: relative;
    height: 260px;
    overflow: hidden;
}

.card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s ease, filter 0.4s ease;
    filter: brightness(0.92) saturate(1.1);
}

.fountain-card:hover .card-image {
    transform: scale(1.1);
    filter: brightness(0.78) saturate(1.25);
}

.card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(2, 6, 23, 0.92), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1.2rem;
}

.fountain-card:hover .card-overlay {
    opacity: 1;
}

.card-badge {
    position: absolute;
    top: 0.8rem;
    left: 0.8rem;
    z-index: 2;
    background: rgba(2, 6, 23, 0.85);
    border: 1px solid rgba(200, 169, 110, 0.35);
    color: var(--glt);
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.overlay-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--cream);
    margin-bottom: 0.3rem;
}

.overlay-price {
    font-size: 0.82rem;
    color: var(--glt);
    margin-bottom: 0.7rem;
}

.overlay-buttons {
    display: flex;
    gap: 0.5rem;
}

.overlay-btn {
    padding: 0.35rem 0.9rem;
    border-radius: 8px;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    font-family: 'Poppins', sans-serif;
}

.overlay-btn-green {
    background: var(--green);
    color: #fff;
}

.overlay-btn-green:hover {
    background: #16a34a;
}

.overlay-btn-details {
    background: rgba(200, 169, 110, 0.9);
    color: var(--n1);
}

.overlay-btn-details:hover {
    background: var(--gold);
}

.card-body {
    padding: 1.3rem 1.5rem 1.6rem;
}

.card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    color: var(--cream);
    margin-bottom: 0.3rem;
}

.card-description {
    font-size: 0.75rem;
    line-height: 1.7;
    color: rgba(203, 213, 225, 0.52);
    margin-bottom: 0.9rem;
}

.card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    color: var(--glt);
    margin-bottom: 0.8rem;
}

.action-buttons {
    display: flex;
    gap: 0.5rem;
}

.action-btn {
    flex: 1;
    padding: 0.6rem;
    border-radius: 9px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    text-decoration: none;
    text-align: center;
    display: inline-block;
}

.action-green {
    background: var(--green);
    color: #fff;
}

.action-green:hover {
    background: #16a34a;
    transform: translateY(-2px);
}

.action-details {
    background: rgba(200, 169, 110, 0.15);
    border: 1px solid rgba(200, 169, 110, 0.28);
    color: var(--glt);
}

.action-details:hover {
    background: rgba(200, 169, 110, 0.25);
    transform: translateY(-2px);
}

.action-whatsapp {
    background: rgba(37, 211, 102, 0.12);
    border: 1px solid rgba(37, 211, 102, 0.25);
    color: #6fda9a;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
}

.action-whatsapp:hover {
    background: rgba(37, 211, 102, 0.22);
    transform: translateY(-2px);
}

/* Slider Arrows */
.slider-arrow {
    position: absolute;
    top: 42%;
    transform: translateY(-50%);
    z-index: 10;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(200, 169, 110, 0.18);
    border: 1px solid rgba(200, 169, 110, 0.35);
    color: var(--glt);
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.slider-arrow:hover {
    background: rgba(200, 169, 110, 0.35);
    transform: translateY(-50%) scale(1.1);
}

.slider-arrow:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.arrow-prev {
    left: 0;
}

.arrow-next {
    right: 0;
}

/* Slider Dots */
.slider-dots {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    margin-top: 2rem;
    flex-wrap: wrap;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(200, 169, 110, 0.25);
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0;
}

.dot.active {
    background: var(--gold);
    transform: scale(1.4);
}

.counter {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(203, 213, 225, 0.4);
}

.counter span {
    color: var(--gold);
}

/* ====================================
   MANDIR/TEMPLE GRID SECTION
==================================== */
.mandir-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5rem;
    perspective: 1400px;
}

@media (max-width: 900px) {
    .mandir-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 560px) {
    .mandir-grid {
