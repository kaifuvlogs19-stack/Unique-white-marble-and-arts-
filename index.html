<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique White Marble And Art | Premium Marble Crafts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--glt:#e2c68a;--gdk:#8a6a3a;--n1:#0f172a;--n2:#020617;--n3:#1e293b;--cream:#f1f5f9;--text:#cbd5e1;--green:#22c55e;--white:#ffffff}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;font-weight:300;background:var(--n1);color:var(--text);overflow-x:hidden}
/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.85rem 5vw;background:rgba(2,6,23,.96);border-bottom:1px solid rgba(200,169,110,.15);backdrop-filter:blur(14px);transition:box-shadow .3s}
header.sc{box-shadow:0 4px 30px rgba(0,0,0,.6)}
.logo{display:flex;flex-direction:column}
.logo-main{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--glt);letter-spacing:.08em;text-transform:uppercase;line-height:1.1}
.logo-main em{font-style:italic;color:var(--gold)}
.logo-sub{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(200,169,110,.55);margin-top:.1rem}
.nav-r{display:flex;align-items:center;gap:1.2rem}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(203,213,225,.7);text-decoration:none;transition:color .3s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
.nav-links a:hover{color:var(--glt)}
.nav-links a:hover::after{width:100%}
.cbt{background:rgba(200,169,110,.15);border:1px solid rgba(200,169,110,.3);color:var(--glt);padding:.38rem .85rem;border-radius:20px;font-size:.63rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;font-family:'Poppins',sans-serif;transition:all .3s}
.cbt:hover{background:rgba(200,169,110,.25)}
.cc{background:var(--green);color:#fff;font-size:.55rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}
.cc.on{display:flex}
.hb{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:.3rem}
.hb span{width:22px;height:2px;background:var(--glt);border-radius:2px;transition:all .35s}
.hb.on span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hb.on span:nth-child(2){opacity:0;transform:scaleX(0)}
.hb.on span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:768px){.nav-links{display:none!important}.hb{display:flex}}
/* MOBILE NAV */
.mnav{position:fixed;inset:0;z-index:190;background:rgba(2,6,23,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;opacity:0;pointer-events:none;transition:opacity .35s;backdrop-filter:blur(20px)}
.mnav.on{opacity:1;pointer-events:all}
.mnav a{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--cream);text-decoration:none;transition:color .3s;opacity:0;transform:translateY(20px)}
.mnav.on a{opacity:1;transform:translateY(0)}
.mnav.on a:nth-child(1){transition:all .4s ease .05s}
.mnav.on a:nth-child(2){transition:all .4s ease .1s}
.mnav.on a:nth-child(3){transition:all .4s ease .15s}
.mnav.on a:nth-child(4){transition:all .4s ease .2s}
.mnav.on a:nth-child(5){transition:all .4s ease .25s}
.mnav a:hover{color:var(--gold)}
/* HERO */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8rem 5vw 5rem}
.hbg{position:absolute;inset:0;z-index:0;background:#020617}
.hbg video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.hov{position:absolute;inset:0;z-index:1;background:linear-gradient(160deg,rgba(2,6,23,.78),rgba(10,15,30,.65) 50%,rgba(2,6,23,.82))}
.hgw{position:absolute;inset:0;z-index:2;background:radial-gradient(ellipse 70% 60% at 65% 35%,rgba(200,169,110,.12),transparent 65%);pointer-events:none}
.hcon{position:relative;z-index:3;text-align:center;max-width:820px}
.ey{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;opacity:0;animation:fup .8s ease .3s forwards}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:300;line-height:1.1;color:var(--cream);margin-bottom:1.2rem;opacity:0;animation:fup .9s ease .5s forwards}
.hero h1 em{font-style:italic;color:var(--glt)}
.hsub{font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(203,213,225,.6);margin-bottom:2.5rem;opacity:0;animation:fup .8s ease .7s forwards}
.htags{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-bottom:2.8rem;opacity:0;animation:fup .8s ease .85s forwards}
.tag{border:1px solid rgba(200,169,110,.3);padding:.35rem .9rem;font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);border-radius:20px;background:rgba(200,169,110,.06);transition:all .3s}
.tag:hover{background:rgba(200,169,110,.15);border-color:var(--gold)}
.hbtns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fup .8s ease 1s forwards}
.btn{display:inline-block;padding:.82rem 2rem;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;border-radius:8px;transition:all .35s;font-family:'Poppins',sans-serif;cursor:pointer;border:none;font-weight:400}
.bg{background:var(--gold);color:var(--n1);box-shadow:0 4px 20px rgba(200,169,110,.35);font-weight:600}
.bg:hover{background:var(--glt);transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,169,110,.5)}
.bo{border:1px solid rgba(200,169,110,.4);color:var(--glt);background:transparent}
.bo:hover{background:rgba(200,169,110,.1);transform:translateY(-2px)}
.bg2{background:var(--green);color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.3)}
.bg2:hover{background:#16a34a;transform:translateY(-2px)}
.shi{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:0;animation:fin 1s ease 1.4s forwards}
.shi span{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,169,110,.5)}
.sl{width:1px;height:32px;background:linear-gradient(to bottom,var(--gold),transparent);animation:pul 2s ease infinite}
/* STATS */
.stats{padding:3rem 5vw;background:linear-gradient(135deg,var(--n3),var(--n2));border-top:1px solid rgba(200,169,110,.12);border-bottom:1px solid rgba(200,169,110,.12);display:flex;flex-wrap:wrap;justify-content:center;gap:3rem;text-align:center}
.sn{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;color:var(--glt);line-height:1}
.sl2{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(203,213,225,.4);margin-top:.3rem}
/* STRIP */
.strip{padding:.7rem 5vw;display:flex;align-items:center;gap:.8rem;border-top:3px solid var(--gold);background:linear-gradient(135deg,rgba(200,169,110,.08),rgba(30,41,59,.4))}
.strip.gr{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(30,41,59,.4))}
.st{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(203,213,225,.55)}
.st strong{color:var(--cream)}
/* SECTION */
.sec{padding:5rem 5vw}
.lbl{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.7rem;display:block}
.ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;color:var(--cream);line-height:1.15;margin-bottom:.9rem}
.ttl em{font-style:italic;background:linear-gradient(90deg,var(--gold),var(--glt),var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 3s linear infinite}
.dv{width:55px;height:1px;background:linear-gradient(to right,var(--gold),transparent);margin-bottom:1.2rem}
.ds{font-size:.82rem;line-height:1.9;color:rgba(203,213,225,.55);max-width:540px}
.rv{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.rv.vi{opacity:1;transform:translateY(0)}
/* CATEGORY BUTTONS */
.cat-btns{display:flex;gap:1rem;margin-top:3rem;flex-wrap:wrap}
.cat-btn{display:flex;align-items:center;gap:.8rem;padding:1.4rem 2rem;background:var(--n3);border:1px solid rgba(200,169,110,.15);border-radius:14px;text-decoration:none;transition:all .4s;cursor:pointer;font-family:'Poppins',sans-serif;min-width:220px;flex:1}
.cat-btn:hover{border-color:var(--gold);background:rgba(200,169,110,.08);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.cat-icon{font-size:2.5rem}
.cat-info .cat-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--cream);margin-bottom:.25rem}
.cat-info .cat-count{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(203,213,225,.45)}
.cat-arr{margin-left:auto;font-size:1.2rem;color:var(--gold);transition:transform .3s}
.cat-btn:hover .cat-arr{transform:translateX(4px)}
/* FOUNTAIN SLIDER */
.fpls{display:flex;flex-wrap:wrap;gap:.55rem;margin:1.8rem 0}
.fpp{padding:.4rem 1.1rem;border:1px solid rgba(200,169,110,.2);border-radius:20px;background:transparent;color:rgba(203,213,225,.5);font-family:'Poppins',sans-serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.fpp.on,.fpp:hover{background:var(--gold);border-color:var(--gold);color:var(--n1);font-weight:600}
.sldr{position:relative;padding:0 3.2rem}
@media(max-width:600px){.sldr{padding:0 2.5rem}}
.sldr-out{overflow:hidden;border-radius:14px}
.sldr-tr{display:flex;gap:1.5rem;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform;cursor:grab}
.sldr-tr.dg{cursor:grabbing;transition:none}
/* FOUNTAIN CARD */
.fc{flex:0 0 calc(33.333% - 1rem);background:var(--n3);border-radius:16px;overflow:hidden;border:1px solid rgba(200,169,110,.1);transition:box-shadow .4s,border-color .3s,transform .35s;opacity:0;transform:translateY(24px)}
.fc.vi{opacity:1;transform:translateY(0)}
.fc:hover{box-shadow:0 24px 60px rgba(0,0,0,.55);border-color:rgba(200,169,110,.35);transform:translateY(-7px)}
@media(max-width:900px){.fc{flex:0 0 calc(50% - .75rem)}}
@media(max-width:560px){.fc{flex:0 0 100%}}
.fc-iw{position:relative;height:230px;overflow:hidden}
.fc-img{width:100%;height:100%;object-fit:cover;transition:transform .6s,filter .4s;filter:brightness(.9) saturate(1.1)}
.fc:hover .fc-img{transform:scale(1.08);filter:brightness(.72) saturate(1.2)}
.fc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,6,23,.92),transparent 55%);opacity:0;transition:opacity .35s;display:flex;flex-direction:column;justify-content:flex-end;padding:1.1rem}
.fc:hover .fc-ov{opacity:1}
.fc-bg{position:absolute;top:.7rem;left:.7rem;z-index:2;background:rgba(2,6,23,.85);border:1px solid rgba(200,169,110,.3);color:var(--glt);font-size:.52rem;letter-spacing:.13em;text-transform:uppercase;padding:.22rem .6rem;border-radius:12px}
.fc-on{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--cream);margin-bottom:.25rem}
.fc-op{font-size:.76rem;color:var(--glt);margin-bottom:.55rem}
.ov-b{display:flex;gap:.45rem}
.ovbt{padding:.3rem .8rem;border-radius:6px;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .3s;font-family:'Poppins',sans-serif;font-weight:500}
.obg{background:var(--gold);color:var(--n1)}
.obg:hover{background:var(--glt)}
.obd{background:rgba(255,255,255,.15);color:#fff;backdrop-filter:blur(4px)}
.fc-bd{padding:1.1rem 1.3rem 1.4rem}
.fc-nm{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--cream);margin-bottom:.25rem}
.fc-dc{font-size:.7rem;line-height:1.65;color:rgba(203,213,225,.5);margin-bottom:.8rem}
.fc-pr{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--glt);margin-bottom:.7rem}
.abr{display:flex;gap:.45rem}
.ab{flex:1;padding:.5rem;border-radius:7px;font-family:'Poppins',sans-serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .3s;text-decoration:none;text-align:center;display:inline-block;font-weight:500}
.ag{background:var(--gold);color:var(--n1)}.ag:hover{background:var(--glt)}
.ad{background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.25);color:var(--glt)}.ad:hover{background:rgba(200,169,110,.25)}
.aw{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);color:#6fda9a;text-decoration:none}.aw:hover{background:rgba(37,211,102,.22)}
/* SLIDER NAV */
.arr{position:absolute;top:38%;transform:translateY(-50%);z-index:10;width:46px;height:46px;border-radius:50%;background:rgba(200,169,110,.15);border:1px solid rgba(200,169,110,.35);color:var(--glt);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s}
.arr:hover{background:rgba(200,169,110,.3);transform:translateY(-50%) scale(1.1)}
.arr:disabled{opacity:.25;cursor:not-allowed}
.apr{left:0}.anx{right:0}
.dots{display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(200,169,110,.2);border:none;cursor:pointer;transition:all .3s;padding:0}
.dot.on{background:var(--gold);transform:scale(1.3)}
.ctr{text-align:center;margin-top:.8rem;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(203,213,225,.35)}
.ctr span{color:var(--gold)}
/* MANDIR GRID */
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:2.5rem;perspective:1200px}
@media(max-width:700px){.mg{grid-template-columns:1fr}}
.mc{background:var(--n3);border-radius:18px;overflow:hidden;border:1px solid rgba(200,169,110,.12);opacity:0;transform:rotateY(12deg) rotateX(6deg) scale(.96);transition:opacity .7s,transform .7s cubic-bezier(.4,0,.2,1),box-shadow .4s,border-color .3s;will-change:transform}
.mc.vi{opacity:1;transform:rotateY(0) rotateX(0) scale(1);animation:mfl 5s ease-in-out infinite}
@keyframes mfl{0%,100%{box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(200,169,110,.08)}50%{box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 35px rgba(200,169,110,.12)}}
.mc:hover{transform:rotateY(-4deg) rotateX(3deg) scale(1.03) translateY(-6px)!important;box-shadow:0 32px 80px rgba(0,0,0,.6)!important;border-color:rgba(200,169,110,.45)!important}
.mc-iw{position:relative;height:300px;overflow:hidden}
.mc-img{width:100%;height:100%;object-fit:cover;transition:transform .6s,filter .4s;filter:brightness(.9) saturate(1.05)}
.mc:hover .mc-img{transform:scale(1.07);filter:brightness(.75)}
.mc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,6,23,.9),transparent 50%);opacity:0;transition:opacity .35s;display:flex;align-items:flex-end;padding:1.2rem;gap:.6rem}
.mc:hover .mc-ov{opacity:1}
.mc-bg{position:absolute;top:.75rem;left:.75rem;z-index:2;background:rgba(2,6,23,.85);border:1px solid rgba(200,169,110,.38);color:var(--glt);font-size:.54rem;letter-spacing:.13em;text-transform:uppercase;padding:.22rem .65rem;border-radius:12px}
.mc-bd{padding:1.5rem 1.6rem 1.7rem}
.mc-nm{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--cream);margin-bottom:.3rem}
.mc-dc{font-size:.72rem;line-height:1.7;color:rgba(203,213,225,.5);margin-bottom:.9rem}
.mc-sz{background:rgba(2,6,23,.45);border-radius:9px;padding:.95rem;margin-bottom:1rem}
.mst{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.msr{display:flex;justify-content:space-between;font-size:.7rem;color:rgba(203,213,225,.52);padding:.25rem 0;border-bottom:1px solid rgba(200,169,110,.07)}
.msr:last-child{border:none}
.msr strong{color:var(--cream)}
.mc-pr{font-family:'Cormorant Garamond',serif;font-size:1.65rem;color:var(--glt);margin-bottom:.8rem}
/* ABOUT */
#about{background:var(--n2)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;margin-top:3rem}
@media(max-width:768px){.about-grid{grid-template-columns:1fr;gap:3rem}}
.about-img-wrap{position:relative}
.about-img-placeholder{width:100%;aspect-ratio:4/5;background:linear-gradient(135deg,var(--n3),rgba(30,41,59,.4));border:1px solid rgba(200,169,110,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;overflow:hidden}
.about-img-placeholder img{width:100%;height:100%;object-fit:cover;border-radius:16px}
.about-badge{position:absolute;bottom:-1.5rem;right:-1.5rem;width:120px;height:120px;border:1px solid rgba(200,169,110,.25);border-radius:50%;background:var(--n1);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:1rem}
.ab-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);line-height:1}
.ab-txt{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(200,169,110,.55);margin-top:.2rem}
.about-features{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2rem}
.af{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.12);border-radius:10px;padding:1rem 1.1rem;transition:all .35s}
.af:hover{border-color:rgba(200,169,110,.3);background:rgba(200,169,110,.1)}
.af-icon{font-size:1.5rem;margin-bottom:.4rem}
.af-title{font-size:.78rem;color:var(--cream);font-weight:500;margin-bottom:.2rem}
.af-text{font-size:.68rem;color:rgba(203,213,225,.45);line-height:1.6}
/* WHY */
.wg{display:flex;flex-wrap:wrap;justify-content:center;gap:1.3rem;margin-top:3rem}
.wc{background:var(--n3);border:1px solid rgba(200,169,110,.1);border-radius:14px;padding:1.8rem 1.4rem;width:190px;opacity:0;transform:translateY(20px);transition:all .5s;text-align:center}
.wc.vi{opacity:1;transform:translateY(0)}
.wc:hover{border-color:rgba(200,169,110,.35);transform:translateY(-6px);box-shadow:0 14px 35px rgba(0,0,0,.3)}
.wi{font-size:2rem;display:block;margin-bottom:.7rem}
.wn{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);margin-bottom:.35rem}
.wt{font-size:.68rem;line-height:1.7;color:rgba(203,213,225,.45)}
/* REVIEWS */
.rg{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem;margin-top:3rem}
.rc{background:var(--n3);border:1px solid rgba(200,169,110,.1);border-radius:14px;padding:1.8rem;width:280px;text-align:left;opacity:0;transform:translateY(20px);transition:all .5s}
.rc.vi{opacity:1;transform:translateY(0)}
.rc:hover{border-color:rgba(200,169,110,.3);box-shadow:0 12px 35px rgba(0,0,0,.3)}
.rs{color:var(--gold);font-size:.9rem;margin-bottom:.65rem}
.rt{font-size:.78rem;line-height:1.8;color:rgba(203,213,225,.65);margin-bottom:.9rem;font-style:italic}
.rn{font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.ry{font-size:.62rem;color:rgba(203,213,225,.3);margin-top:.15rem}
/* CONTACT */
.cp{display:inline-flex;align-items:center;gap:.8rem;margin:2rem 0;padding:1.3rem 2.5rem;border:1px solid rgba(200,169,110,.25);border-radius:8px;background:rgba(200,169,110,.05);text-decoration:none;transition:all .35s}
.cp:hover{background:rgba(200,169,110,.12);border-color:var(--gold);transform:scale(1.02)}
.pn{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--cream)}
.wa-cta{display:inline-flex;align-items:center;gap:.55rem;padding:.78rem 1.7rem;background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);border-radius:8px;color:#6fda9a;text-decoration:none;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;transition:all .3s}
.wa-cta:hover{background:rgba(37,211,102,.22)}
